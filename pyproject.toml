[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "kassiber"
version = "0.21.0"
description = "Open-source, local-first Bitcoin accounting CLI with multi-account and multi-wallet support."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "AGPL-3.0-only" }
authors = [
  { name = "Bitcoin Austria" }
]
dependencies = [
  "embit>=0.8.0",
  "PySide6>=6.7,<7",
  "rp2 @ git+https://github.com/bitcoinaustria/rp2.git@23c944962c775667794b19d66e785058d7aaf599",
]

[project.scripts]
kassiber = "kassiber.cli.main:main"

[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
where = ["."]
include = ["kassiber*"]

[tool.setuptools.package-data]
"kassiber.ui" = [
  "resources/qml/*.qml",
  "resources/qml/pages/*.qml",
  "resources/qml/components/*.qml",
  "resources/qml/components/*.js",
  "resources/qml/dialogs/*.qml",
  "resources/fonts/*.ttf",
  "resources/fonts/*/*.ttf",
]
