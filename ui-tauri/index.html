<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kassiber — local-first Bitcoin accounting</title>
    <style>
      /*
       * Paint a themed background and a quiet boot indicator before any
       * stylesheet, JS bundle, or React root mounts. Without this the
       * webview shows a plain white rectangle until React is ready, which
       * reads as the app freezing — especially noticeable in dark mode
       * before the lock screen materializes.
       *
       * React's createRoot replaces #root's children on first render, so
       * the splash disappears as soon as the real UI takes over.
       */
      :root { color-scheme: light dark; }
      html, body { margin: 0; padding: 0; height: 100%; }
      body {
        background-color: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        color: #1f2937;
      }
      @media (prefers-color-scheme: dark) {
        body { background-color: #0a0a0a; color: #e5e7eb; }
        .kb-boot__spinner { border-color: rgba(229, 231, 235, 0.18); border-top-color: #e5e7eb; }
        .kb-boot__label { color: rgba(229, 231, 235, 0.6); }
      }
      #root { height: 100%; }
      .kb-boot {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        height: 100%;
      }
      .kb-boot__spinner {
        width: 28px;
        height: 28px;
        border: 2px solid rgba(31, 41, 55, 0.16);
        border-top-color: #1f2937;
        border-radius: 50%;
        animation: kb-boot-spin 0.9s linear infinite;
      }
      .kb-boot__label {
        font-size: 13px;
        letter-spacing: 0.04em;
        color: rgba(31, 41, 55, 0.6);
      }
      @keyframes kb-boot-spin { to { transform: rotate(360deg); } }
      @media (prefers-reduced-motion: reduce) {
        .kb-boot__spinner { animation: none; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="kb-boot" role="status" aria-live="polite">
        <div class="kb-boot__spinner" aria-hidden="true"></div>
        <div class="kb-boot__label">Loading Kassiber…</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
