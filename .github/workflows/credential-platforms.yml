name: credential-platforms

on:
  pull_request:
    paths:
      - ".github/workflows/credential-platforms.yml"
      - "kassiber/secrets/**"
      - "kassiber/operator/**"
      - "kassiber/cli/**"
      - "kassiber/core/runtime.py"
      - "kassiber/db.py"
      - "tests/test_remembered_unlock.py"
      - "tests/test_operator_cli.py"
      - "tests/test_operator_client.py"
      - "tests/test_operator_modes.py"
      - "tests/test_operator_native_auth.py"
      - "tests/test_operator_protocol.py"
      - "tests/test_operator_project.py"
      - "tests/test_operator_server.py"
      - "tests/test_operator_service.py"
      - "ui-tauri/src-tauri/**"
      - "pyproject.toml"
      - "uv.lock"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/credential-platforms.yml"
      - "kassiber/secrets/**"
      - "kassiber/operator/**"
      - "kassiber/cli/**"
      - "kassiber/core/runtime.py"
      - "kassiber/db.py"
      - "tests/test_remembered_unlock.py"
      - "tests/test_operator_cli.py"
      - "tests/test_operator_client.py"
      - "tests/test_operator_modes.py"
      - "tests/test_operator_native_auth.py"
      - "tests/test_operator_protocol.py"
      - "tests/test_operator_project.py"
      - "tests/test_operator_server.py"
      - "tests/test_operator_service.py"
      - "ui-tauri/src-tauri/**"
      - "pyproject.toml"
      - "uv.lock"

concurrency:
  group: credential-platforms-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  credential-contract:
    name: credential-contract (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            libappindicator3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            patchelf

      - name: Install Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable

      - name: Test desktop credential library
        run: cargo test --manifest-path ui-tauri/src-tauri/Cargo.toml --lib

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Sync Python dependencies
        run: uv sync --locked

      - name: Test credential, broker lifecycle, routing, and ownership contracts
        run: >-
          uv run --locked python -m unittest
          tests.test_remembered_unlock
          tests.test_operator_cli
          tests.test_operator_client
          tests.test_operator_modes
          tests.test_operator_native_auth
          tests.test_operator_protocol
          tests.test_operator_project
          tests.test_operator_server
          tests.test_operator_service
          -v
