name: credential-platforms

on:
  pull_request:
    paths:
      - ".github/workflows/credential-platforms.yml"
      - "kassiber/secrets/**"
      - "tests/test_remembered_unlock.py"
      - "ui-tauri/src-tauri/**"
      - "pyproject.toml"
      - "uv.lock"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/credential-platforms.yml"
      - "kassiber/secrets/**"
      - "tests/test_remembered_unlock.py"
      - "ui-tauri/src-tauri/**"
      - "pyproject.toml"
      - "uv.lock"

jobs:
  credential-contract:
    name: credential-contract (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            libappindicator3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            patchelf

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test desktop credential library
        run: cargo test --manifest-path ui-tauri/src-tauri/Cargo.toml --lib

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync Python dependencies
        run: uv sync --frozen

      - name: Test CLI remembered-unlock contract
        run: uv run python -m unittest tests.test_remembered_unlock -v
