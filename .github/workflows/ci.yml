name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Install desktop dependencies
        run: pnpm --dir ui-tauri install --frozen-lockfile

      # Type-safe i18n keys (and all TS): catches typo'd / missing / wrong-namespace
      # translation keys. The en/de key-parity guard runs via Vitest inside the
      # quality gate below.
      - name: Desktop UI typecheck
        run: pnpm --dir ui-tauri run typecheck

      - name: Quality gate
        run: ./scripts/quality-gate.sh
