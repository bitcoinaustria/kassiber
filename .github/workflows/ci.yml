name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: 10.33.0

      - name: Install desktop dependencies
        run: pnpm --dir ui-tauri install --frozen-lockfile

      # Type-safe i18n keys (and all TS): catches typo'd / missing / wrong-namespace
      # translation keys. The en/de key-parity guard runs via Vitest inside the
      # quality gate below.
      - name: Desktop UI typecheck
        run: pnpm --dir ui-tauri run typecheck

      - name: Quality gate
        run: ./scripts/quality-gate.sh
