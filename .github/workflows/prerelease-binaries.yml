name: prerelease-binaries

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Attach artifacts to a GitHub prerelease"
        required: true
        default: false
        type: boolean
      tag_name:
        description: "Existing tag to publish to when publish_release is true"
        required: false
        default: ""
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  HOMEBREW_TAP_REPOSITORY: bitcoinaustria/homebrew-kassiber
  HOMEBREW_TAP_BRANCH: main
  HOMEBREW_CASK_PATH: Casks/kassiber.rb

concurrency:
  group: prerelease-binaries-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.os }} binary
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - macos-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Derive artifact target
        id: target
        shell: bash
        run: |
          set -euo pipefail
          case "$(uname -s)" in
            Darwin) os_name="macos" ;;
            Linux) os_name="linux" ;;
            *) os_name="$(uname -s | tr '[:upper:]' '[:lower:]')" ;;
          esac
          case "$(uname -m)" in
            arm64|aarch64) arch_name="arm64" ;;
            x86_64|amd64) arch_name="x64" ;;
            *) arch_name="$(uname -m | tr '[:upper:]' '[:lower:]')" ;;
          esac
          echo "target=${os_name}-${arch_name}" >> "$GITHUB_OUTPUT"

      - name: Build one-file CLI binary
        shell: bash
        run: |
          set -euo pipefail
          uv run --with pyinstaller==6.20.0 pyinstaller \
            --clean \
            --noconfirm \
            --onefile \
            --name kassiber \
            --paths . \
            --collect-data kassiber \
            --collect-submodules embit \
            --collect-data embit \
            --collect-submodules rp2 \
            --collect-data rp2 \
            --collect-submodules prezzemolo \
            --collect-submodules keyring.backends \
            --copy-metadata keyring \
            --hidden-import prezzemolo.avl_tree \
            --hidden-import rp2.plugin.country.at \
            scripts/kassiber_pyinstaller_entry.py

      - name: Smoke packaged CLI
        shell: bash
        run: |
          set -euo pipefail
          ./dist/kassiber --help >/dev/null
          ./dist/kassiber --data-root "$RUNNER_TEMP/kassiber-status-smoke" --machine status >/dev/null

          kraken_root="$RUNNER_TEMP/kassiber-kraken-bundled-smoke"
          printf '{"request_id":"kraken-bundled-1","kind":"ui.rates.kraken_csv.import","args":{"use_bundled":true}}\n{"request_id":"shutdown-1","kind":"daemon.shutdown"}\n' \
            | ./dist/kassiber --data-root "$kraken_root" daemon \
            > "$RUNNER_TEMP/kassiber-kraken-bundled-smoke.jsonl"
          grep '"kind":"ui.rates.kraken_csv.import"' "$RUNNER_TEMP/kassiber-kraken-bundled-smoke.jsonl" >/dev/null
          grep '"bundled":true' "$RUNNER_TEMP/kassiber-kraken-bundled-smoke.jsonl" >/dev/null
          grep '"pairs":2' "$RUNNER_TEMP/kassiber-kraken-bundled-smoke.jsonl" >/dev/null
          grep '"rows":255181' "$RUNNER_TEMP/kassiber-kraken-bundled-smoke.jsonl" >/dev/null

          at_root="$RUNNER_TEMP/kassiber-at-smoke"
          ./dist/kassiber --data-root "$at_root" --machine init >/dev/null
          ./dist/kassiber --data-root "$at_root" --machine workspaces create Smoke >/dev/null
          ./dist/kassiber \
            --data-root "$at_root" \
            --machine \
            profiles create \
            --workspace Smoke \
            --tax-country at \
            --gains-algorithm MOVING_AVERAGE_AT \
            Austrian >/dev/null
          ./dist/kassiber \
            --data-root "$at_root" \
            --machine \
            wallets create \
            --workspace Smoke \
            --profile Austrian \
            --label AustrianSmoke \
            --kind address \
            --address bc1qw508d6qejxtdg4y5r3zarvary0c5xw7kygt080 >/dev/null
          at_csv="$RUNNER_TEMP/kassiber-at-smoke.csv"
          cat > "$at_csv" <<'CSV'
          date,txid,direction,asset,amount,fee,fiat_rate,description
          2026-01-01T10:00:00Z,packaged-at-buy,inbound,BTC,0.10000000,0,80000,Packaged smoke acquisition
          2026-02-01T10:00:00Z,packaged-at-sell,outbound,BTC,0.05000000,0.0001,82000,Packaged smoke disposal
          CSV
          ./dist/kassiber \
            --data-root "$at_root" \
            --machine \
            wallets import-csv \
            --workspace Smoke \
            --profile Austrian \
            --wallet AustrianSmoke \
            --file "$at_csv" >/dev/null
          ./dist/kassiber \
            --data-root "$at_root" \
            --machine \
            journals process \
            --workspace Smoke \
            --profile Austrian >/dev/null
          xlsx_file="$RUNNER_TEMP/kassiber-at-smoke.xlsx"
          ./dist/kassiber \
            --data-root "$at_root" \
            --machine \
            reports export-austrian-e1kv-xlsx \
            --workspace Smoke \
            --profile Austrian \
            --year 2026 \
            --file "$xlsx_file" >/dev/null
          test -s "$xlsx_file"

          descriptor_root="$RUNNER_TEMP/kassiber-descriptor-smoke"
          ./dist/kassiber --data-root "$descriptor_root" --machine init >/dev/null
          ./dist/kassiber --data-root "$descriptor_root" --machine workspaces create Smoke >/dev/null
          ./dist/kassiber \
            --data-root "$descriptor_root" \
            --machine \
            profiles create \
            --workspace Smoke \
            --fiat-currency USD \
            --tax-country generic \
            Descriptor >/dev/null
          ./dist/kassiber \
            --data-root "$descriptor_root" \
            --machine \
            wallets create \
            --workspace Smoke \
            --profile Descriptor \
            --label DescriptorSmoke \
            --kind descriptor \
            --descriptor 'wpkh([91790c21/84h/0h/0h]xpub6CpT4xRJntYQuFwkiZfSiK7jEtPM3e9nUfJKQ8ATWkgYJui4WS5HmzjD6C7avtwAFtmEyAusdFFxg2rZMs73SoSVkPQfEaQtrLGox92JNWn/0/*)' \
            --gap-limit 1 >/dev/null
          ./dist/kassiber \
            --data-root "$descriptor_root" \
            --machine \
            wallets derive \
            --workspace Smoke \
            --profile Descriptor \
            --wallet DescriptorSmoke \
            --count 1 >/dev/null

      - name: Package binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          package_name="kassiber-cli-${{ steps.target.outputs.target }}"
          mkdir -p "release/${package_name}"
          cp dist/kassiber "release/${package_name}/kassiber"
          chmod 755 "release/${package_name}/kassiber"
          tar -C release -czf "release/${package_name}.tar.gz" "${package_name}"

      - name: Upload CLI artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: kassiber-cli-${{ steps.target.outputs.target }}
          path: |
            release/*.tar.gz
          if-no-files-found: error

  build-desktop:
    name: Build ${{ matrix.label }} desktop preview
    needs:
      - build-desktop-sidecar
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS arm64
            os: macos-latest
            target: macos-arm64
            bundles: app,dmg
            tauri_args: --target aarch64-apple-darwin
            sidecar_artifact_pattern: kassiber-desktop-sidecar-aarch64-apple-darwin
            sidecar_expected: 1
          - label: Linux
            os: ubuntu-22.04
            target: linux-x64
            bundles: appimage
            tauri_args: ""
            sidecar_artifact_pattern: kassiber-desktop-sidecar-x86_64-unknown-linux-gnu
            sidecar_expected: 1
          - label: Windows
            os: windows-latest
            target: windows-x64
            bundles: msi,nsis
            tauri_args: ""
            sidecar_artifact_pattern: kassiber-desktop-sidecar-x86_64-pc-windows-msvc
            sidecar_expected: 1

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref }}

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: 10.33.0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: stable

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libfuse2 \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Install frontend dependencies
        working-directory: ui-tauri
        run: pnpm install --frozen-lockfile

      - name: Download desktop CLI sidecar
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: ${{ matrix.sidecar_artifact_pattern }}
          path: ui-tauri/src-tauri/binaries
          merge-multiple: true

      - name: Verify desktop CLI sidecar inputs
        shell: bash
        run: |
          set -euo pipefail
          count="$(find ui-tauri/src-tauri/binaries -maxdepth 1 -type f -name 'kassiber-cli-*' | wc -l | tr -d ' ')"
          test "$count" = "${{ matrix.sidecar_expected }}"
          find ui-tauri/src-tauri/binaries -maxdepth 1 -type f -name 'kassiber-cli-*' -exec chmod 755 {} +
          find ui-tauri/src-tauri/binaries -maxdepth 1 -type f -name 'kassiber-cli-*' -print

      - name: Build unsigned desktop preview
        working-directory: ui-tauri
        run: pnpm tauri build ${{ matrix.tauri_args }} --bundles ${{ matrix.bundles }} --ci

      - name: Package desktop artifacts
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p release
          while IFS= read -r -d '' artifact; do
              name="$(basename "$artifact")"
              case "$artifact" in
                *.app)
                  zip_name="kassiber-${{ matrix.target }}.app.zip"
                  ditto -c -k --keepParent "$artifact" "release/${zip_name}"
                  ;;
                *.AppImage)
                  artifact_name="kassiber-${{ matrix.target }}.AppImage"
                  cp "$artifact" "release/${artifact_name}"
                  ;;
                *.dmg)
                  artifact_name="kassiber-${{ matrix.target }}.dmg"
                  cp "$artifact" "release/${artifact_name}"
                  ;;
                *.exe)
                  artifact_name="kassiber-${{ matrix.target }}.exe"
                  cp "$artifact" "release/${artifact_name}"
                  ;;
                *.msi)
                  artifact_name="kassiber-${{ matrix.target }}.msi"
                  cp "$artifact" "release/${artifact_name}"
                  ;;
              esac
          done < <(
            find ui-tauri/src-tauri/target \
              -path "*/release/bundle/*" \
              \( -name "*.AppImage" -o -name "*.app" -o -name "*.dmg" -o -name "*.exe" -o -name "*.msi" \) -print0
          )
          test -n "$(find release -type f -print -quit)"

      - name: Upload desktop artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: kassiber-desktop-${{ matrix.target }}-preview
          path: |
            release/*
          if-no-files-found: error

  build-desktop-sidecar:
    name: Build ${{ matrix.label }} desktop CLI sidecar
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS arm64
            os: macos-latest
            triple: aarch64-apple-darwin
            exe_ext: ""
          - label: Linux x86_64
            os: ubuntu-22.04
            triple: x86_64-unknown-linux-gnu
            exe_ext: ""
          - label: Windows x86_64
            os: windows-latest
            triple: x86_64-pc-windows-msvc
            exe_ext: ".exe"

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Build one-file CLI sidecar
        shell: bash
        run: |
          set -euo pipefail
          uv run --with pyinstaller==6.20.0 pyinstaller \
            --clean \
            --noconfirm \
            --onefile \
            --name kassiber-cli \
            --paths . \
            --collect-data kassiber \
            --collect-submodules embit \
            --collect-data embit \
            --collect-submodules rp2 \
            --collect-data rp2 \
            --collect-submodules prezzemolo \
            --collect-submodules keyring.backends \
            --copy-metadata keyring \
            --hidden-import prezzemolo.avl_tree \
            --hidden-import rp2.plugin.country.at \
            scripts/kassiber_pyinstaller_entry.py

      - name: Smoke CLI sidecar
        shell: bash
        run: |
          set -euo pipefail
          sidecar="./dist/kassiber-cli${{ matrix.exe_ext }}"
          "$sidecar" --help >/dev/null

          daemon_root="$RUNNER_TEMP/kassiber-cli-sidecar-smoke"
          printf '{"request_id":"smoke-1","kind":"daemon.shutdown"}\n' \
            | "$sidecar" --data-root "$daemon_root" daemon \
            > "$RUNNER_TEMP/cli-sidecar-smoke.jsonl"
          grep '"kind":"daemon.ready"' "$RUNNER_TEMP/cli-sidecar-smoke.jsonl"
          grep '"kind":"daemon.shutdown"' "$RUNNER_TEMP/cli-sidecar-smoke.jsonl"

          kraken_root="$RUNNER_TEMP/kassiber-cli-sidecar-kraken-bundled-smoke"
          printf '{"request_id":"kraken-bundled-1","kind":"ui.rates.kraken_csv.import","args":{"use_bundled":true}}\n{"request_id":"shutdown-1","kind":"daemon.shutdown"}\n' \
            | "$sidecar" --data-root "$kraken_root" daemon \
            > "$RUNNER_TEMP/cli-sidecar-kraken-bundled-smoke.jsonl"
          grep '"kind":"ui.rates.kraken_csv.import"' "$RUNNER_TEMP/cli-sidecar-kraken-bundled-smoke.jsonl" >/dev/null
          grep '"bundled":true' "$RUNNER_TEMP/cli-sidecar-kraken-bundled-smoke.jsonl" >/dev/null
          grep '"pairs":2' "$RUNNER_TEMP/cli-sidecar-kraken-bundled-smoke.jsonl" >/dev/null
          grep '"rows":255181' "$RUNNER_TEMP/cli-sidecar-kraken-bundled-smoke.jsonl" >/dev/null

          descriptor_root="$RUNNER_TEMP/kassiber-cli-sidecar-descriptor-smoke"
          "$sidecar" --data-root "$descriptor_root" --machine init >/dev/null
          "$sidecar" --data-root "$descriptor_root" --machine workspaces create Smoke >/dev/null
          "$sidecar" \
            --data-root "$descriptor_root" \
            --machine \
            profiles create \
            --workspace Smoke \
            --fiat-currency USD \
            --tax-country generic \
            Descriptor >/dev/null
          "$sidecar" \
            --data-root "$descriptor_root" \
            --machine \
            wallets create \
            --workspace Smoke \
            --profile Descriptor \
            --label DescriptorSmoke \
            --kind descriptor \
            --descriptor 'wpkh([91790c21/84h/0h/0h]xpub6CpT4xRJntYQuFwkiZfSiK7jEtPM3e9nUfJKQ8ATWkgYJui4WS5HmzjD6C7avtwAFtmEyAusdFFxg2rZMs73SoSVkPQfEaQtrLGox92JNWn/0/*)' \
            --gap-limit 1 >/dev/null
          "$sidecar" \
            --data-root "$descriptor_root" \
            --machine \
            wallets derive \
            --workspace Smoke \
            --profile Descriptor \
            --wallet DescriptorSmoke \
            --count 1 >/dev/null

      - name: Stage sidecar for desktop bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p sidecar
          src="dist/kassiber-cli${{ matrix.exe_ext }}"
          dst="sidecar/kassiber-cli-${{ matrix.triple }}${{ matrix.exe_ext }}"
          cp "$src" "$dst"
          chmod 755 "$dst"

      - name: Upload desktop sidecar
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: kassiber-desktop-sidecar-${{ matrix.triple }}
          path: sidecar/*
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish prerelease
    permissions:
      contents: write
    needs:
      - build
      - build-desktop
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
      inputs.publish_release == true &&
      inputs.tag_name != '')

    steps:
      - name: Download CLI release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: kassiber-cli-*
          path: release
          merge-multiple: true

      - name: Download desktop release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: kassiber-desktop-*-preview
          path: release
          merge-multiple: true

      - name: Verify release artifact set
        shell: bash
        run: |
          set -euo pipefail
          test -n "$(find release -maxdepth 1 -type f -print -quit)"

          if find release -maxdepth 1 -type f -name 'kassiber-cli-*' ! -name '*.tar.gz' -print -quit | grep -q .; then
            echo "Raw CLI sidecars must not be published as release assets." >&2
            find release -maxdepth 1 -type f -name 'kassiber-cli-*' ! -name '*.tar.gz' >&2
            exit 1
          fi

      - name: Generate checksum manifest
        shell: bash
        run: |
          set -euo pipefail

          sha256_file() {
            if command -v shasum >/dev/null 2>&1; then
              shasum -a 256 "$1" | awk '{print $1}'
            else
              sha256sum "$1" | awk '{print $1}'
            fi
          }

          find release -maxdepth 1 -type f ! -name SHA256SUMS.txt -print0 \
            | sort -z \
            | while IFS= read -r -d '' artifact; do
                printf "%s  %s\n" "$(sha256_file "$artifact")" "$(basename "$artifact")"
              done > release/SHA256SUMS.txt

      - name: Create or update prerelease
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          prerelease: true
          fail_on_unmatched_files: true
          body: |
            Automated Kassiber prerelease artifacts.

            These artifacts are unsigned prerelease builds for CLI and desktop
            preview testing. Desktop previews now bundle the Kassiber CLI
            sidecar, so normal daemon calls do not require a separate Python
            checkout, and the GUI executable can forward `--cli ...` to the
            bundled CLI. Set `KASSIBER_PYTHON` only when intentionally
            overriding the bundled sidecar for debugging.
          files: |
            release/*

      - name: Check Homebrew tap publishing
        id: homebrew-tap
        shell: bash
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "$HOMEBREW_TAP_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "HOMEBREW_TAP_TOKEN is not configured; skipping Homebrew cask update."
          fi

      - name: Check out Homebrew tap
        if: steps.homebrew-tap.outputs.enabled == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: ${{ env.HOMEBREW_TAP_REPOSITORY }}
          ref: ${{ env.HOMEBREW_TAP_BRANCH }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Render Homebrew cask
        if: steps.homebrew-tap.outputs.enabled == 'true'
        shell: bash
        env:
          RELEASE_TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
        run: |
          set -euo pipefail
          tag_name="${RELEASE_TAG_NAME}"
          version="${tag_name#v}"
          dmg_name="kassiber-macos-arm64.dmg"
          dmg_path="release/${dmg_name}"
          cask_path="homebrew-tap/${HOMEBREW_CASK_PATH}"

          test -f "$dmg_path"
          sha256="$(awk -v name="$dmg_name" '$2 == name { print $1 }' release/SHA256SUMS.txt)"
          test -n "$sha256"

          python scripts/render_homebrew_cask.py \
            --version "$version" \
            --sha256 "$sha256" \
            --output "$cask_path"

      - name: Commit Homebrew cask update
        if: steps.homebrew-tap.outputs.enabled == 'true'
        shell: bash
        working-directory: homebrew-tap
        env:
          RELEASE_TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
        run: |
          set -euo pipefail
          tag_name="${RELEASE_TAG_NAME}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$HOMEBREW_CASK_PATH"

          if git diff --cached --quiet; then
            echo "Homebrew cask already matches ${tag_name}; nothing to push."
            exit 0
          fi

          git commit -m "Update Kassiber cask to ${tag_name}"
          git push origin "HEAD:${HOMEBREW_TAP_BRANCH}"
