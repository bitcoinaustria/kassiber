name: prerelease-binaries

on:
  pull_request:
    paths:
      - ".github/workflows/prerelease-binaries.yml"
      - ".github/workflows/finalize-signed-release.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "kassiber/__init__.py"
      - "kassiber/build_info.py"
      - "kassiber/cli/**"
      - "kassiber/operator/**"
      - "kassiber/release_verification.py"
      - "scripts/kassiber_pyinstaller_entry.py"
      - "scripts/build-apt-repository.sh"
      - "scripts/build-rpm-repository.sh"
      - "scripts/package-cli-deb.sh"
      - "scripts/package-cli-rpm.sh"
      - "scripts/package-desktop-rpm.sh"
      - "scripts/prepare-obs-package.sh"
      - "scripts/release_manifest.py"
      - "scripts/render_aur.py"
      - "scripts/render_nix.py"
      - "scripts/write_build_info.py"
      - "packaging/linux/**"
      - "packaging/release/**"
      - "tests/test_dependency_drift.py"
      - "ui-tauri/package.json"
      - "ui-tauri/pnpm-lock.yaml"
      - "ui-tauri/src-tauri/build.rs"
      - "ui-tauri/src-tauri/Cargo.lock"
      - "ui-tauri/src-tauri/Cargo.toml"
      - "ui-tauri/src-tauri/Info.plist"
      - "ui-tauri/src-tauri/bin/**"
      - "ui-tauri/src-tauri/icons/**"
      - "ui-tauri/src-tauri/src/lib.rs"
      - "ui-tauri/src-tauri/src/main.rs"
      - "ui-tauri/src-tauri/src/supervisor.rs"
      - "ui-tauri/src-tauri/tauri.conf.json"
      - "ui-tauri/src-tauri/windows/**"
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Attach artifacts to a GitHub release"
        required: true
        default: false
        type: boolean
      release_channel:
        description: "Publish as a prerelease or stable release"
        required: true
        default: prerelease
        type: choice
        options:
          - prerelease
          - release
      tag_name:
        description: "Existing tag to publish to when publish_release is true"
        required: false
        default: ""
        type: string
      draft_release:
        description: "Keep the GitHub release as a draft for offline PGP signing"
        required: true
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  BUILD_CHANNEL: ${{ github.event_name == 'pull_request' && 'dev' || (github.event_name == 'workflow_dispatch' && inputs.release_channel || 'prerelease') }}
  HOMEBREW_TAP_REPOSITORY: bitcoinaustria/homebrew-kassiber
  HOMEBREW_TAP_BRANCH: main
  HOMEBREW_CASK_PATH: Casks/kassiber.rb
  HOMEBREW_FORMULA_PATH: Formula/kassiber-cli.rb

concurrency:
  group: prerelease-binaries-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-cli:
    name: Build ${{ matrix.label }} CLI
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS arm64
            os: macos-latest
            target: macos-arm64
            triple: aarch64-apple-darwin
            exe_ext: ""
            archive: tar
          - label: Linux x86_64
            os: ubuntu-22.04
            target: linux-x64
            triple: x86_64-unknown-linux-gnu
            exe_ext: ""
            archive: tar
          - label: Windows x86_64
            os: windows-latest
            target: windows-x64
            triple: x86_64-pc-windows-msvc
            exe_ext: ".exe"
            archive: zip

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked

      - name: Install Linux RPM tooling
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cpio rpm

      - name: Write packaged build identity
        shell: bash
        env:
          DISPATCH_TAG_NAME: ${{ inputs.tag_name }}
          DISPATCH_PUBLISH_RELEASE: ${{ inputs.publish_release }}
        run: |
          set -euo pipefail
          uv run --locked python -m unittest \
            tests.test_dependency_drift.DependencyDriftTests.test_app_version_is_consistent_across_package_metadata
          version="$(uv run --locked python -c 'import kassiber; print(kassiber.__version__)')"
          release_tag=""
          if [ "$GITHUB_EVENT_NAME" = "push" ] && [ "$GITHUB_REF_TYPE" = "tag" ]; then
            release_tag="$GITHUB_REF_NAME"
          elif [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] \
              && [ "$DISPATCH_PUBLISH_RELEASE" = "true" ]; then
            release_tag="$DISPATCH_TAG_NAME"
          fi
          if [ -n "$release_tag" ]; then
            case "$release_tag" in
              v*) expected_version="${release_tag#v}" ;;
              *)
                echo "Release tag must start with v: $release_tag" >&2
                exit 1
                ;;
            esac
            if [ "$version" != "$expected_version" ]; then
              echo "Release tag $release_tag does not match package version $version." >&2
              exit 1
            fi
          fi
          package_commit="$(git rev-parse HEAD)"
          package_ref="$GITHUB_REF_NAME"
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] && [ -n "$DISPATCH_TAG_NAME" ]; then
            package_ref="$DISPATCH_TAG_NAME"
          fi
          SOURCE_DATE_EPOCH="$(git show -s --format=%ct HEAD)"
          export SOURCE_DATE_EPOCH
          uv run --locked python scripts/write_build_info.py \
            --output build/BUILD_INFO.json \
            --version "$version" \
            --commit "$package_commit" \
            --ref "$package_ref" \
            --run-id "$GITHUB_RUN_ID" \
            --channel "$BUILD_CHANNEL"
          echo "PACKAGE_VERSION=$version" >> "$GITHUB_ENV"

      - name: Build one-file CLI binary
        shell: bash
        run: |
          set -euo pipefail
          observer_collect_args=(
            --collect-submodules bdkpython
            --collect-data bdkpython
            --copy-metadata bdkpython
          )
          if uv run --locked python -c 'import lwk'; then
            observer_collect_args+=(--collect-submodules lwk --collect-data lwk --copy-metadata lwk)
          fi
          uv run --locked --with pyinstaller==6.20.0 pyinstaller \
            --clean \
            --noconfirm \
            --onefile \
            --name kassiber \
            --paths . \
            --collect-data kassiber \
            --add-data "build/BUILD_INFO.json:kassiber/data" \
            "${observer_collect_args[@]}" \
            --collect-submodules embit \
            --collect-data embit \
            --collect-submodules rp2 \
            --collect-data rp2 \
            --collect-submodules prezzemolo \
            --collect-submodules keyring.backends \
            --copy-metadata keyring \
            --hidden-import prezzemolo.avl_tree \
            --hidden-import rp2.plugin.country.at \
            scripts/kassiber_pyinstaller_entry.py

      - name: Smoke packaged CLI
        shell: bash
        run: |
          set -euo pipefail
          assert_contains() {
            file="$1"
            expected="$2"
            if ! grep -F "$expected" "$file" >/dev/null; then
              echo "Expected $expected in $file; captured output follows:" >&2
              cat "$file" >&2
              return 1
            fi
          }
          assert_json_value() {
            file="$1"
            path="$2"
            expected="$3"
            if ! python -c 'import json, sys; from functools import reduce; value = reduce(lambda current, key: current[key], sys.argv[2].split("."), json.load(open(sys.argv[1], encoding="utf-8"))); assert value == sys.argv[3], f"{sys.argv[2]}: expected {sys.argv[3]!r}, got {value!r}"' "$file" "$path" "$expected"; then
              cat "$file" >&2
              return 1
            fi
          }

          cli="./dist/kassiber${{ matrix.exe_ext }}"
          expected_commit="$(git rev-parse --short=12 HEAD)"
          "$cli" --help >/dev/null
          "$cli" --version | grep "$expected_commit"
          status_root="$RUNNER_TEMP/kassiber-status-smoke"
          status_json="$RUNNER_TEMP/kassiber-status-smoke.json"
          if "$cli" --data-root "$status_root" --machine status > "$status_json"; then
            echo "Fresh status unexpectedly succeeded before kassiber init" >&2
            exit 1
          fi
          assert_json_value "$status_json" kind error
          assert_json_value "$status_json" error.code not_initialized
          "$cli" --data-root "$status_root" --machine init >/dev/null
          "$cli" --data-root "$status_root" --machine status > "$status_json"
          assert_json_value "$status_json" kind status

          daemon_root="$RUNNER_TEMP/kassiber-daemon-smoke"
          printf '{"request_id":"smoke-1","kind":"daemon.shutdown"}\n' \
            | "$cli" --data-root "$daemon_root" daemon \
            > "$RUNNER_TEMP/kassiber-daemon-smoke.jsonl"
          assert_contains "$RUNNER_TEMP/kassiber-daemon-smoke.jsonl" '"kind":"daemon.ready"'
          assert_contains "$RUNNER_TEMP/kassiber-daemon-smoke.jsonl" '"kind":"daemon.shutdown"'

          kraken_root="$RUNNER_TEMP/kassiber-kraken-bundled-smoke"
          printf '{"request_id":"kraken-bundled-1","kind":"ui.rates.kraken_csv.import","args":{"use_bundled":true}}\n{"request_id":"shutdown-1","kind":"daemon.shutdown"}\n' \
            | "$cli" --data-root "$kraken_root" daemon \
            > "$RUNNER_TEMP/kassiber-kraken-bundled-smoke.jsonl"
          assert_contains "$RUNNER_TEMP/kassiber-kraken-bundled-smoke.jsonl" '"kind":"ui.rates.kraken_csv.import"'
          assert_contains "$RUNNER_TEMP/kassiber-kraken-bundled-smoke.jsonl" '"bundled":true'
          assert_contains "$RUNNER_TEMP/kassiber-kraken-bundled-smoke.jsonl" '"pairs":2'
          assert_contains "$RUNNER_TEMP/kassiber-kraken-bundled-smoke.jsonl" '"rows":255181'

          operator_root="$RUNNER_TEMP/kassiber-operator-smoke"
          "$cli" --data-root "$operator_root" --machine init >/dev/null
          printf '%s\n' 'packaged operator smoke passphrase' \
            | "$cli" --data-root "$operator_root" --machine secrets init --new-passphrase-fd 0 \
            >/dev/null
          if [ "$RUNNER_OS" = "Linux" ]; then
            # Hosted Linux runners have no live logind user session. Production
            # Kassiber correctly refuses to retain an in-memory unlock there,
            # so smoke the supported non-broker path. The Linux broker lifecycle
            # is exercised separately by test_operator_integration.py with an
            # owner-only logout sentinel.
            printf '%s\n' 'packaged operator smoke passphrase' \
              | "$cli" --data-root "$operator_root" --machine \
                  --db-passphrase-fd 0 status \
              > "$RUNNER_TEMP/kassiber-operator-worker.json"
          else
            if ! printf '%s\n' 'packaged operator smoke passphrase' \
                | "$cli" --data-root "$operator_root" --machine operator unlock \
                    --passphrase-fd 0 --duration 1m \
                > "$RUNNER_TEMP/kassiber-operator-unlock.json"; then
              cat "$RUNNER_TEMP/kassiber-operator-unlock.json" >&2
              exit 1
            fi
            assert_json_value "$RUNNER_TEMP/kassiber-operator-unlock.json" data.lease unlocked
            "$cli" --data-root "$operator_root" --machine status \
              > "$RUNNER_TEMP/kassiber-operator-worker.json"
            "$cli" --data-root "$operator_root" --machine operator lock >/dev/null
          fi
          assert_json_value "$RUNNER_TEMP/kassiber-operator-worker.json" kind status

          at_root="$RUNNER_TEMP/kassiber-at-smoke"
          "$cli" --data-root "$at_root" --machine init >/dev/null
          "$cli" --data-root "$at_root" --machine workspaces create Smoke >/dev/null
          "$cli" \
            --data-root "$at_root" \
            --machine \
            profiles create \
            --workspace Smoke \
            --tax-country at \
            --gains-algorithm MOVING_AVERAGE_AT \
            Austrian >/dev/null
          "$cli" \
            --data-root "$at_root" \
            --machine \
            wallets create \
            --workspace Smoke \
            --profile Austrian \
            --label AustrianSmoke \
            --kind address \
            --address bc1qw508d6qejxtdg4y5r3zarvary0c5xw7kygt080 >/dev/null
          at_csv="$RUNNER_TEMP/kassiber-at-smoke.csv"
          cat > "$at_csv" <<'CSV'
          date,txid,direction,asset,amount,fee,fiat_rate,description
          2026-01-01T10:00:00Z,packaged-at-buy,inbound,BTC,0.10000000,0,80000,Packaged smoke acquisition
          2026-02-01T10:00:00Z,packaged-at-sell,outbound,BTC,0.05000000,0.0001,82000,Packaged smoke disposal
          CSV
          "$cli" \
            --data-root "$at_root" \
            --machine \
            wallets import-csv \
            --workspace Smoke \
            --profile Austrian \
            --wallet AustrianSmoke \
            --file "$at_csv" >/dev/null
          "$cli" \
            --data-root "$at_root" \
            --machine \
            journals process \
            --workspace Smoke \
            --profile Austrian >/dev/null
          xlsx_file="$RUNNER_TEMP/kassiber-at-smoke.xlsx"
          "$cli" \
            --data-root "$at_root" \
            --machine \
            reports export-austrian-e1kv-xlsx \
            --workspace Smoke \
            --profile Austrian \
            --year 2026 \
            --file "$xlsx_file" >/dev/null
          test -s "$xlsx_file"

          descriptor_root="$RUNNER_TEMP/kassiber-descriptor-smoke"
          "$cli" --data-root "$descriptor_root" --machine init >/dev/null
          "$cli" --data-root "$descriptor_root" --machine workspaces create Smoke >/dev/null
          "$cli" \
            --data-root "$descriptor_root" \
            --machine \
            profiles create \
            --workspace Smoke \
            --fiat-currency USD \
            --tax-country generic \
            Descriptor >/dev/null
          "$cli" \
            --data-root "$descriptor_root" \
            --machine \
            wallets create \
            --workspace Smoke \
            --profile Descriptor \
            --label DescriptorSmoke \
            --kind descriptor \
            --descriptor 'wpkh([91790c21/84h/0h/0h]xpub6CpT4xRJntYQuFwkiZfSiK7jEtPM3e9nUfJKQ8ATWkgYJui4WS5HmzjD6C7avtwAFtmEyAusdFFxg2rZMs73SoSVkPQfEaQtrLGox92JNWn/0/*)' \
            --gap-limit 1 >/dev/null
          "$cli" \
            --data-root "$descriptor_root" \
            --machine \
            wallets derive \
            --workspace Smoke \
            --profile Descriptor \
            --wallet DescriptorSmoke \
            --count 1 >/dev/null

      - name: Package CLI-only release
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          package_name="kassiber-cli-${{ matrix.target }}"
          mkdir -p "release/${package_name}"
          cp "dist/kassiber${{ matrix.exe_ext }}" "release/${package_name}/kassiber${{ matrix.exe_ext }}"
          cp build/BUILD_INFO.json "release/${package_name}/BUILD_INFO.json"
          chmod 755 "release/${package_name}/kassiber${{ matrix.exe_ext }}"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            (cd release && 7z a -tzip "${package_name}.zip" "${package_name}")
          else
            tar -C release -czf "release/${package_name}.tar.gz" "${package_name}"
          fi
          if [ "$RUNNER_OS" = "Linux" ]; then
            scripts/package-cli-deb.sh \
              --binary "dist/kassiber${{ matrix.exe_ext }}" \
              --version "$PACKAGE_VERSION" \
              --output "release/${package_name}.deb"
            scripts/package-cli-rpm.sh \
              --binary "dist/kassiber${{ matrix.exe_ext }}" \
              --version "$PACKAGE_VERSION" \
              --architecture x86_64 \
              --output "release/${package_name}.rpm" \
              --source-output "release/${package_name}.src.rpm"
            rpm_path="$PWD/release/${package_name}.rpm"
            rpm_root="$(mktemp -d)"
            (cd "$rpm_root" && rpm2cpio "$rpm_path" | cpio --quiet -id)
            "$rpm_root/usr/bin/kassiber" --version \
              | grep "$(git rev-parse --short=12 HEAD)"
          fi

      - name: Upload CLI-only artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: kassiber-cli-release-${{ matrix.target }}
          path: |
            release/*.tar.gz
            release/*.zip
            release/*.deb
            release/*.rpm
          if-no-files-found: error

      - name: Stage identical CLI as desktop sidecar
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p sidecar
          cp "dist/kassiber${{ matrix.exe_ext }}" \
            "sidecar/kassiber-cli-${{ matrix.triple }}${{ matrix.exe_ext }}"
          chmod 755 "sidecar/kassiber-cli-${{ matrix.triple }}${{ matrix.exe_ext }}"

      - name: Upload desktop sidecar
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: kassiber-desktop-sidecar-${{ matrix.triple }}
          path: sidecar/*
          if-no-files-found: error
          retention-days: 7

  build-desktop:
    name: Build ${{ matrix.label }} desktop preview
    needs:
      - build-cli
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS arm64
            os: macos-latest
            target: macos-arm64
            bundles: app,dmg
            tauri_args: --target aarch64-apple-darwin
            sidecar_artifact_pattern: kassiber-desktop-sidecar-aarch64-apple-darwin
            sidecar_expected: 1
          - label: Linux
            os: ubuntu-22.04
            target: linux-x64
            bundles: deb,appimage
            tauri_args: ""
            sidecar_artifact_pattern: kassiber-desktop-sidecar-x86_64-unknown-linux-gnu
            sidecar_expected: 1
          - label: Windows
            os: windows-latest
            target: windows-x64
            bundles: msi,nsis
            tauri_args: ""
            sidecar_artifact_pattern: kassiber-desktop-sidecar-x86_64-pc-windows-msvc
            sidecar_expected: 1

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref }}

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: 10.33.0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: stable

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cpio \
            curl \
            file \
            libayatana-appindicator3-dev \
            libfuse2 \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            rpm \
            wget

      - name: Install frontend dependencies
        working-directory: ui-tauri
        run: pnpm install --frozen-lockfile

      - name: Download desktop CLI sidecar
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: ${{ matrix.sidecar_artifact_pattern }}
          path: ui-tauri/src-tauri/binaries
          merge-multiple: true

      - name: Verify desktop CLI sidecar inputs
        shell: bash
        run: |
          set -euo pipefail
          count="$(find ui-tauri/src-tauri/binaries -maxdepth 1 -type f -name 'kassiber-cli-*' | wc -l | tr -d ' ')"
          test "$count" = "${{ matrix.sidecar_expected }}"
          find ui-tauri/src-tauri/binaries -maxdepth 1 -type f -name 'kassiber-cli-*' -exec chmod 755 {} +
          find ui-tauri/src-tauri/binaries -maxdepth 1 -type f -name 'kassiber-cli-*' -print

      - name: Build unsigned desktop preview
        working-directory: ui-tauri
        run: pnpm tauri build ${{ matrix.tauri_args }} --bundles ${{ matrix.bundles }} --ci

      - name: Smoke desktop terminal forwarding
        shell: bash
        run: |
          set -euo pipefail
          expected_commit="$(git rev-parse --short=12 HEAD)"
          case "$RUNNER_OS" in
            macOS)
              launcher="$(find ui-tauri/src-tauri/target -path '*/release/bundle/macos/*.app/Contents/Resources/bin/kassiber' -print -quit)"
              test -n "$launcher"
              "$launcher" --version | grep "$expected_commit"
              "$launcher" --help >/dev/null
              ;;
            Linux)
              appimage="$(find ui-tauri/src-tauri/target -path '*/release/bundle/appimage/*.AppImage' -print -quit)"
              test -n "$appimage"
              chmod 755 "$appimage"
              APPIMAGE_EXTRACT_AND_RUN=1 "$appimage" --cli --version \
                | grep "$expected_commit"
              ;;
            Windows)
              # Invoke the .cmd directly: Git Bash runs it via cmd.exe with
              # correct argument passing. An explicit `cmd.exe /d /c ...` is
              # broken here because MSYS path conversion mangles /d and /c,
              # leaving cmd interactive and the smoke silently failing.
              ./ui-tauri/src-tauri/bin/kassiber.cmd --version \
                | grep "$expected_commit"
              ;;
          esac

      - name: Package desktop artifacts
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p release
          while IFS= read -r -d '' artifact; do
              name="$(basename "$artifact")"
              case "$artifact" in
                *.app)
                  zip_name="kassiber-${{ matrix.target }}.app.zip"
                  ditto -c -k --keepParent "$artifact" "release/${zip_name}"
                  ;;
                *.AppImage)
                  artifact_name="kassiber-${{ matrix.target }}.AppImage"
                  cp "$artifact" "release/${artifact_name}"
                  ;;
                *.dmg)
                  artifact_name="kassiber-${{ matrix.target }}.dmg"
                  cp "$artifact" "release/${artifact_name}"
                  ;;
                *.deb)
                  artifact_name="kassiber-${{ matrix.target }}.deb"
                  cp "$artifact" "release/${artifact_name}"
                  ;;
                *.exe)
                  artifact_name="kassiber-${{ matrix.target }}.exe"
                  cp "$artifact" "release/${artifact_name}"
                  ;;
                *.msi)
                  artifact_name="kassiber-${{ matrix.target }}.msi"
                  cp "$artifact" "release/${artifact_name}"
                  ;;
              esac
          done < <(
          find ui-tauri/src-tauri/target \
              -path "*/release/bundle/*" \
              \( -name "*.AppImage" -o -name "*.app" -o -name "*.deb" -o -name "*.dmg" -o -name "*.exe" -o -name "*.msi" \) -print0
          )
          if [ "$RUNNER_OS" = "Linux" ]; then
            desktop_deb="$(find release -maxdepth 1 -type f -name '*.deb' -print -quit)"
            test -n "$desktop_deb"
            package_version="$(python3 -c 'import json; print(json.load(open("ui-tauri/src-tauri/tauri.conf.json", encoding="utf-8"))["version"])')"
            export SOURCE_DATE_EPOCH
            SOURCE_DATE_EPOCH="$(git show -s --format=%ct HEAD)"
            scripts/package-desktop-rpm.sh \
              --deb "$desktop_deb" \
              --version "$package_version" \
              --architecture x86_64 \
              --output "release/kassiber-${{ matrix.target }}.rpm" \
              --source-output "release/kassiber-${{ matrix.target }}.src.rpm"
            rpm_path="$PWD/release/kassiber-${{ matrix.target }}.rpm"
            rpm_root="$(mktemp -d)"
            (cd "$rpm_root" && rpm2cpio "$rpm_path" | cpio --quiet -id)
            rpm_sidecar="$(find "$rpm_root/usr/lib/Kassiber" \
              -type f -name 'kassiber-cli*' -print -quit)"
            test -x "$rpm_sidecar"
            "$rpm_sidecar" --version \
              | grep "$(git rev-parse --short=12 HEAD)"
          fi
          test -n "$(find release -type f -print -quit)"

      - name: Upload desktop artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: kassiber-desktop-${{ matrix.target }}-preview
          path: |
            release/*
          if-no-files-found: error

  publish:
    name: Publish release artifacts
    permissions:
      contents: write
    needs:
      - build-cli
      - build-desktop
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
      inputs.publish_release == true &&
      inputs.tag_name != '')

    steps:
      - name: Check out Kassiber source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref }}

      - name: Require the release tag to come from trusted main history
        run: |
          set -euo pipefail
          if ! git merge-base --is-ancestor HEAD origin/main; then
            echo "Release tag must point to a commit in origin/main history." >&2
            exit 1
          fi

      - name: Enforce release signing cutover policy
        id: release-signing
        env:
          RELEASE_IS_DRAFT: ${{ github.event_name == 'workflow_dispatch' && inputs.draft_release == true }}
        run: |
          set -euo pipefail
          policy_json="$(python3 scripts/release_manifest.py policy \
            --policy packaging/release/signing-policy.json)"
          policy_enabled="$(python3 -c 'import json,sys; print(str(json.loads(sys.argv[1])["enabled"]).lower())' "$policy_json")"
          if [ "$policy_enabled" = true ] && [ "$RELEASE_IS_DRAFT" != true ]; then
            echo "Signed-release policy is enabled; build a draft and publish it only through finalize-signed-release.yml." >&2
            exit 1
          fi
          echo "enabled=$policy_enabled" >> "$GITHUB_OUTPUT"

      - name: Download CLI release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: kassiber-cli-release-*
          path: release
          merge-multiple: true

      - name: Download desktop release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: kassiber-desktop-*-preview
          path: release
          merge-multiple: true

      - name: Verify release artifact set
        shell: bash
        run: |
          set -euo pipefail
          test -n "$(find release -maxdepth 1 -type f -print -quit)"

          if find release -maxdepth 1 -type f -name 'kassiber-cli-*' ! -name '*.tar.gz' ! -name '*.zip' ! -name '*.deb' ! -name '*.rpm' -print -quit | grep -q .; then
            echo "Raw CLI sidecars must not be published as release assets." >&2
            find release -maxdepth 1 -type f -name 'kassiber-cli-*' ! -name '*.tar.gz' ! -name '*.zip' ! -name '*.deb' ! -name '*.rpm' >&2
            exit 1
          fi

      - name: Generate release manifest
        id: release-manifest
        shell: bash
        env:
          RELEASE_TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
        run: |
          set -euo pipefail
          version="${RELEASE_TAG_NAME#v}"
          python scripts/release_manifest.py generate \
            --release-dir release \
            --version "$version"
          manifest_path="release/kassiber-${version}-manifest.txt"
          test -s "$manifest_path"
          echo "path=${manifest_path}" >> "$GITHUB_OUTPUT"

      - name: Create or update release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          prerelease: ${{ github.event_name != 'workflow_dispatch' || inputs.release_channel == 'prerelease' }}
          draft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft_release == true }}
          fail_on_unmatched_files: true
          body: |
            Automated Kassiber release artifacts.

            Each release includes a versioned SHA-256 manifest. A release is
            PGP-authenticated only when the matching `.txt.asc` detached
            signature is also attached and verifies against Kassiber's
            independently published release-key fingerprint. Current packages
            remain unsigned until that key and signature are published.

            Platform code signing is separate from the PGP manifest. These are
            currently unsigned CLI and desktop builds.
            CLI-only archives are published for macOS, Linux, and Windows;
            Linux also gets GUI-free CLI-only Debian/RPM packages, a desktop
            RPM, and source RPM inputs for COPR or OBS.
            Desktop bundles use the exact same CLI executable, so normal daemon
            calls do not require a separate Python checkout. Native desktop
            installers integrate `kassiber` with the terminal; portable builds
            can install a user-local launcher from Settings. Set
            `KASSIBER_PYTHON` only when intentionally overriding the bundled
            sidecar for debugging.
          files: |
            release/*

      - name: Check Homebrew tap publishing
        id: homebrew-tap
        shell: bash
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          RELEASE_IS_DRAFT: ${{ github.event_name == 'workflow_dispatch' && inputs.draft_release == true }}
          RELEASE_SIGNING_ENABLED: ${{ steps.release-signing.outputs.enabled }}
        run: |
          set -euo pipefail
          if [ "$RELEASE_SIGNING_ENABLED" = "true" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Signed release metadata is published only after offline verification by the finalizer."
          elif [ "$RELEASE_IS_DRAFT" = "true" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Release is a draft pending offline PGP signing; skipping Homebrew update."
          elif [ -n "$HOMEBREW_TAP_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "HOMEBREW_TAP_TOKEN is not configured; skipping Homebrew cask update."
          fi

      - name: Check out Homebrew tap
        if: steps.homebrew-tap.outputs.enabled == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: ${{ env.HOMEBREW_TAP_REPOSITORY }}
          ref: ${{ env.HOMEBREW_TAP_BRANCH }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Render Homebrew cask and CLI formula
        if: steps.homebrew-tap.outputs.enabled == 'true'
        shell: bash
        env:
          RELEASE_TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          RELEASE_MANIFEST_PATH: ${{ steps.release-manifest.outputs.path }}
        run: |
          set -euo pipefail
          tag_name="${RELEASE_TAG_NAME}"
          version="${tag_name#v}"

          release_sha256() {
            local name="$1"
            local sha256
            test -f "release/${name}"
            sha256="$(awk -v name="$name" '$2 == name { print $1 }' "$RELEASE_MANIFEST_PATH")"
            test -n "$sha256"
            printf '%s' "$sha256"
          }

          python scripts/render_homebrew.py cask \
            --version "$version" \
            --sha256 "$(release_sha256 kassiber-macos-arm64.dmg)" \
            --output "homebrew-tap/${HOMEBREW_CASK_PATH}"

          python scripts/render_homebrew.py cli-formula \
            --version "$version" \
            --sha256-macos-arm64 "$(release_sha256 kassiber-cli-macos-arm64.tar.gz)" \
            --sha256-linux-x64 "$(release_sha256 kassiber-cli-linux-x64.tar.gz)" \
            --output "homebrew-tap/${HOMEBREW_FORMULA_PATH}"

      - name: Commit Homebrew tap update
        if: steps.homebrew-tap.outputs.enabled == 'true'
        shell: bash
        working-directory: homebrew-tap
        env:
          RELEASE_TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
        run: |
          set -euo pipefail
          tag_name="${RELEASE_TAG_NAME}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$HOMEBREW_CASK_PATH" "$HOMEBREW_FORMULA_PATH"

          if git diff --cached --quiet; then
            echo "Homebrew tap already matches ${tag_name}; nothing to push."
            exit 0
          fi

          git commit -m "Update Kassiber cask and CLI formula to ${tag_name}"
          git push origin "HEAD:${HOMEBREW_TAP_BRANCH}"
